[pytest]
# --- Test discovery ---
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Default run options ---
# --html: generate a self-contained HTML report
# --maxfail=5: stop after 5 failures (fast feedback)
# -v: verbose (show each test name)
addopts = -v --html=reports/report.html --self-contained-html --maxfail=5

# --- Markers (so tests can be grouped and run selectively) ---
# Run only smoke tests with:      pytest -m smoke
# Run only regression tests with: pytest -m regression
markers =
    smoke: quick critical-path checks
    regression: fuller regression suite
